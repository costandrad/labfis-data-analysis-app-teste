name: Deploy Shinylive App

on:
  push:
    branches: [ main, master ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependências do Python e Shinylive
      run: |
        python -m pip install --upgrade pip
        # Instalamos o shinylive compiler
        pip install shinylive
        # CRUCIAL: Instalamos as dependências do app no ambiente de build!
        # Isso permite que o shinylive localize e empacote os arquivos .whl do lmfit e scipy para o Wasm.
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Compilar App para WebAssembly (Shinylive)
      run: |
        # Agora o compilador tem acesso físico às dependências instaladas e gerará o bundle completo
        shinylive export app site

    - name: Configurar Páginas do GitHub
      uses: actions/configure-pages@v4

    - name: Upload do Artefato
      uses: actions/upload-pages-artifact@v3
      with:
        path: './site'

    - name: Deploy para o GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4