name: Deploy Shinylive App

on:
  push:
    branches: [ main, master ] # Dispara o deploy ao commitar na branch principal

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Shinylive Compiler
      run: |
        python -m pip install --upgrade pip
        pip install shinylive

    - name: Compilar App para WebAssembly (Shinylive)
      run: |
        # Transforma a pasta ./app em um site estático na pasta ./site
        shinylive export app site

    - name: Configurar Páginas do GitHub
      uses: actions/configure-pages@v4

    - name: Upload do Artefato
      uses: actions/upload-pages-artifact@v3
      with:
        path: './site'

    - name: Deploy para o GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4